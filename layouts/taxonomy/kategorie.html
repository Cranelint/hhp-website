{{ define "main" }}
<section class="page">
  <div class="container">
    <header class="page-header">
      <h1>Referenzen: {{ .Title }}</h1>
    </header>

    <nav class="category-nav" aria-label="Referenz-Kategorien">
      <ul class="category-list">
        {{ range .Site.Taxonomies.kategorie }}
        <li><a href="{{ .Page.Permalink }}"{{ if eq .Page.Title $.Title }} aria-current="page"{{ end }}>{{ .Page.Title }} <span class="count">({{ .Count }})</span></a></li>
        {{ end }}
      </ul>
    </nav>

    <div class="project-grid">
      {{ range .Pages }}
      <a href="{{ .Permalink }}" class="project-card">
        {{ with .Params.images }}
        <div class="project-card-image">
          <img src="{{ index . 0 }}" alt="{{ $.Title }}" loading="lazy" width="400" height="300">
        </div>
        {{ end }}
        <div class="project-card-body">
          <h2>{{ .Title }}</h2>
          {{ with .Params.location }}<p class="project-card-location">{{ . }}</p>{{ end }}
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
