{{ define "main" }}
<section class="page">
  <div class="container">
    <header class="page-header">
      <h1>{{ .Title }}</h1>
    </header>
    <div class="page-content prose">
      {{ .Content }}
    </div>
    {{ if .Pages }}
    <div class="page-list">
      {{ range .Pages }}
      <div class="page-list-item">
        <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        {{ with .Description }}<p>{{ . }}</p>{{ end }}
      </div>
      {{ end }}
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
