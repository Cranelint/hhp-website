---
layout: default
---
<article class="page">
  <div class="container">
    <header class="page-header">
      <h1>{{ page.title }}</h1>
      <p class="lead">{{ page.lead }}</p>
    </header>

    <div class="leistungen-grid">
      {% for item in page.items %}
      <a href="{{ item.url | relative_url }}" class="leistung-card">
        <div class="leistung-card-icon">
          {% include icon.html name=item.icon %}
        </div>
        <h2>{{ item.name }}</h2>
        <p>{{ item.description }}</p>
        <span class="link-arrow">Mehr erfahren {% include icon.html name="arrow-right" %}</span>
      </a>
      {% endfor %}
    </div>
  </div>
</article>
